[workspace]
authors = ["Scarlet McLearn <getratulnow@gmail.com>"]
channels = ["conda-forge"]
name = "portfolio"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[dependencies]
nodejs = "==22.23.1"
pnpm = "==10.33.2"

[tasks]
install = "node scripts/guarded-command.mjs --timeout=300000 --heartbeat=15000 --label=pnpm-install --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false install --frozen-lockfile"
dev = "pnpm --config.confirmModulesPurge=false exec astro dev"
build = "node scripts/guarded-command.mjs --timeout=180000 --heartbeat=15000 --idle-timeout=120000 --label=astro-build --env=ASTRO_TELEMETRY_DISABLED=1 --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false exec astro build"
preview = "pnpm --config.confirmModulesPurge=false exec astro preview"
typecheck = "node scripts/guarded-command.mjs --timeout=180000 --heartbeat=15000 --idle-timeout=120000 --label=astro-check --env=ASTRO_TELEMETRY_DISABLED=1 --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false exec astro check"
lint = "node scripts/guarded-command.mjs --timeout=180000 --heartbeat=15000 --idle-timeout=120000 --label=eslint --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false exec eslint ."
"lint:fix" = "pnpm --config.confirmModulesPurge=false exec eslint . --fix"
format = "pnpm --config.confirmModulesPurge=false exec prettier . --write"
"format:check" = "node scripts/guarded-command.mjs --timeout=180000 --heartbeat=15000 --idle-timeout=120000 --label=prettier-check --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false exec prettier . --check"
"test:e2e" = "node scripts/guarded-command.mjs --timeout=600000 --heartbeat=15000 --idle-timeout=180000 --label=playwright-test --env=ASTRO_TELEMETRY_DISABLED=1 --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false exec playwright test"
"playwright:install" = "node scripts/guarded-command.mjs --timeout=300000 --heartbeat=15000 --idle-timeout=180000 --label=playwright-install --env=CI=true --env=PNPM_CONFIG_CONFIRM_MODULES_PURGE=false -- pnpm --config.confirmModulesPurge=false exec playwright install --with-deps chromium"
"preview:e2e" = "node scripts/playwright-web-server.mjs"
