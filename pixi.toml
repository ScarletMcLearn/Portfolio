[workspace]
authors = ["Scarlet McLearn <getratulnow@gmail.com>"]
channels = ["conda-forge"]
name = "portfolio"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[dependencies]
nodejs = "==22.23.1"
pnpm = "==10.33.2"

[tasks]
install = "pnpm install --frozen-lockfile"
dev = "node scripts/run-local-bin.mjs astro dev"
build = "node scripts/run-local-bin.mjs astro build"
preview = "node scripts/run-local-bin.mjs astro preview"
typecheck = "node scripts/run-local-bin.mjs astro check"
lint = "node scripts/run-local-bin.mjs eslint ."
"lint:fix" = "node scripts/run-local-bin.mjs eslint . --fix"
format = "node scripts/run-local-bin.mjs prettier . --write"
"format:check" = "node scripts/run-local-bin.mjs prettier . --check"
"test:e2e" = "node scripts/run-local-bin.mjs playwright test"
"playwright:install" = "node scripts/run-local-bin.mjs playwright install --with-deps chromium"
