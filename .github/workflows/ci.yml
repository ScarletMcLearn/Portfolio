name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: v0.70.1
          cache: true

      - name: Install dependencies
        run: pixi run install

      - name: Format check
        run: pixi run format:check

      - name: Lint
        run: pixi run lint

      - name: Typecheck
        run: pixi run typecheck

      - name: Install Playwright browsers
        run: pixi run playwright:install

      - name: Run e2e tests
        run: pixi run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Build
        run: pixi run build
        env:
          SITE_URL: https://scarletmclearn.github.io
          SITE_BASE: /Portfolio
